    <!DOCTYPE html>
    <html lang="pt">
    <head>
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
        <meta charset="UTF-8">
        <title>Relatório de Deteções - Trator</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
            h2 { color: #000000; margin-top: 30px; }
            table { width: 100%;  table-layout: fixed;  width: 100%;border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
            th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; color: #000000; }
            th { background-color: #83BE42; color: #000000; }
            tr:hover { background-color: #f1f1f1; }
    

            .header-container {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 30px;
            }

            .logo-stats-group {
                display: flex;
                align-items: center;
                gap: 30px;
            }


            
    .modal {
        display: none; 
        position: fixed; 
        z-index: 2000; 
        padding-top: 50px; 
        left: 0;
        top: 0;
        width: 100%; 
        height: 100%; 
        overflow: auto; 
        background-color: rgba(0,0,0,0.85); 
        cursor: zoom-out; 
    }

    .modal-content {
        margin: auto;
        display: block;
        max-width: 90%; 
        max-height: 85vh;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        
        animation-name: zoom;
        animation-duration: 0.3s;
    }

    .scroll-container {
    max-height: 400px; 
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
}

    @keyframes zoom {
        from {transform:scale(0)} 
        to {transform:scale(1)}
    }

    .close-modal {
        position: absolute;
        top: 15px;
        right: 35px;
        color: #f1f1f1;
        font-size: 40px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
    }

    .close-modal:hover,
    .close-modal:focus {
        color: #83BE42;
        text-decoration: none;
        transform: scale(1.2);
    }
        </style>
    </head>
    <body>

        <div class="header-container">
            <div class="logo-stats-group">
                <img src="{{ url_for('static', filename='logo_sonae.png') }}" alt="Logo SONAE ARAUCO" style="max-width: 150px;">
                
                <div style="background: #ffffff; border-left: 6px solid #83BE42; padding: 10px 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column;">
                    <h4 style="margin: 0; color: #95a5a6; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">
                        Contagem do Dia: {{ data_selecionada }}
                    </h4>
                    <div id="contador-container" style="display: flex; align-items: center; margin-top: 5px;">
        <span id="num-contador" style="font-size: 2.2rem; font-weight: 800; color: #2c3e50; line-height: 1;">
            {{ total }}
        </span>
        <span style="margin-left: 10px; font-size: 1.5rem;">🚜</span>

    </div>
                </div>
            </div>

           
        </div>

        <div style="margin-bottom: 20px; padding: 15px; background: #e9e9e9; border-radius: 8px; display: inline-block; width: 100%; box-sizing: border-box;">
            <form action="/" method="GET" style="display: flex; gap: 10px; align-items: center;">
                <label for="data"><strong>Filtrar por Dia:</strong></label>
                <input type="date" id="data" name="data" value="{{ data_selecionada }}" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <button type="submit" style="padding: 6px 20px; cursor: pointer; background-color: #333; color: white; border: none; border-radius: 4px;">🔍 Filtrar</button>
                <a href="/" style="text-decoration: none; font-size: 0.9rem; color: #666; margin-left: 10px;">Limpar Filtro</a>
<button type="submit" 
            onclick="encerrarapp()" 
            style="margin-left: auto; padding: 6px 30px; cursor: pointer; background-color: #ff0000; color: white; border: none; border-radius: 6px;">
        Sair da aplicação
    </button>
            </form>
        </div>

        </div>

    <h2>Histórico de recolha de rejeitados grossos - SONAE ARAUCO</h2>

   <div class="scroll-container" style="max-height: 320px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 50px; background: white;">
    <table style="width: 100%; border-collapse: collapse;">
        <thead style="position: sticky; top: 0; background-color: #83BE42; color: black; z-index: 10;">
            <tr>
                <th style="padding: 12px;">ID</th>
                <th>Início da recolha</th>
                <th>Fim da recolha</th>
                <th>Duração(s)</th>
                <th>Imagem</th>
            </tr>
        </thead>
        
        <tbody id="corpo-tabela" 
               hx-get="/tabela_atualizada?data={{ data_selecionada }}" 
               hx-trigger="every 2s" 
               hx-swap="innerHTML">
            {% include 'tabela_parcial.html' %}
        </tbody>
    </table>
</div>

<div style="margin: 30px 0; text-align: center;">
    <h3 style="color: #333; font-size: 1rem;">Visualização em Tempo Real</h3>
    <div style="border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); overflow: hidden; border: 3px solid #333; display: inline-block;">
        <img src="{{ url_for('video_feed') }}" width="800">
    </div>
</div>
    

        <div id="meuModalImagem" class="modal" onclick="fecharModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgModalGrande">
    </div>

        <script>

        function abrirModal(srcImagem) {
        var modal = document.getElementById("meuModalImagem");
        var imgModal = document.getElementById("imgModalGrande");
        
        modal.style.display = "block"; 
        imgModal.src = srcImagem; 
    }

    function fecharModal() {
        var modal = document.getElementById("meuModalImagem");
        modal.style.display = "none"; 
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            fecharModal();
        }
    });

    const dataCarregamento = new Date().toLocaleDateString('en-CA');

function atualizaPaginaData() {
    const hoje = new Date().toLocaleDateString('en-CA');
    
    if (hoje !== dataCarregamento) {
        window.location.href = "/"; 
    }
}

setInterval(atualizaPaginaData, 10000);

function encerrarapp(){
    const resposta = confirm("Tem a certeza que deseja encerrar a aplicação?");
    if(resposta === true){
    fetch('/encerrarApp', { method: 'POST'});
    window.close();
    }

}

  
        </script>
    </body>
    </html>
