{% for linha in detecoes %}
<tr>
    <td style="padding: 10px; text-align: center; border-bottom: 1px solid #eee;">{{ linha.id }}</td>
    <td class="area-falha" data-area="{{ linha.area_falha or 0 }}" style="display:none;"></td>
    <td style="padding: 10px; text-align: center; border-bottom: 1px solid #eee;">{{ linha.timestamp_inicio }}</td>
    <td style="padding: 10px; text-align: center; border-bottom: 1px solid #eee;">
        {% if linha.imagem_detecao %}
            <img src="{{ linha.imagem_detecao }}" 
                 title="Ver imagens"
                 style="width: 50px; border-radius: 4px; cursor: zoom-in; border: 2px solid #ffffff;"
                 onclick="abrirModal('{{ linha.imagem_detecao }}', '{{ linha.imagem_original }}')">
        {% else %}
            <span style="color: #999; font-size: 0.8rem;">Sem foto</span>
        {% endif %}
    </td>
</tr>
{% endfor %}

<script>
    (function() {
        var el = document.getElementById("num-contador");
        if (el) { el.innerText = "{{ total }}"; }
    })();
</script>
